<!DOCTYPE html>
<html lang="fi" data-lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liminall | Node</title>
  <meta
    name="description"
    content="Node."
  >
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="page-shell">
    <div class="page">
      <main class="panel">
        <div class="panel-top">
          <a class="mark" href="/" aria-label="Liminall">
            <img src="/images/logo.svg" alt="Liminall">
          </a>

          <div class="lang-switch" aria-label="Language switch">
            <button type="button" data-set-lang="fi" aria-pressed="true">FI</button>
            <button type="button" data-set-lang="en" aria-pressed="false">EN</button>
          </div>
        </div>

        <div class="hero-copy">
          <h1>
            <span data-lang="fi">Node</span>
            <span data-lang="en">Node</span>
          </h1>
          <p class="summary">
            <span data-lang="fi">Tälle sivulle tulee lyhyt node-kuvaus.</span>
            <span data-lang="en">A short node description will appear here.</span>
          </p>
        </div>

        <nav class="site-nav" aria-label="Primary">
          <a href="/">
            <span data-lang="fi">Etusivu</span>
            <span data-lang="en">Home</span>
          </a>
          <a href="/what/">
            <span data-lang="fi">Mikä tämä on</span>
            <span data-lang="en">What is this</span>
          </a>
          <a href="/node/">
            <span data-lang="fi">Node</span>
            <span data-lang="en">Node</span>
          </a>
          <a href="/support/">
            <span data-lang="fi">Tuki</span>
            <span data-lang="en">Support</span>
          </a>
        </nav>
      </main>
    </div>
  </div>

  <script>
    const root = document.documentElement;
    const buttons = document.querySelectorAll("[data-set-lang]");

    function setLang(lang) {
      root.lang = lang;
      root.dataset.lang = lang;
      buttons.forEach((button) => {
        button.setAttribute("aria-pressed", String(button.dataset.setLang === lang));
      });
    }

    setLang("fi");

    buttons.forEach((button) => {
      button.addEventListener("click", () => setLang(button.dataset.setLang));
    });
  </script>
</body>
</html>
