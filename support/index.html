<!DOCTYPE html>
<html lang="fi" data-lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Liminall – Tuki</title>
  <link rel="stylesheet" href="/style.css" />
</head>

<body>
  <div class="page-shell">
    <main class="page">
      <section class="panel">

        <div class="panel-top">
          <div class="logo">Liminall</div>
          <button id="lang-toggle">FI / EN</button>
        </div>

        <div class="content">

          <h1>
            <span data-lang="fi">Tuki</span>
            <span data-lang="en">Support</span>
          </h1>

          <p>
            <span data-lang="fi">
              Jos kohtaat ongelman, ota yhteys.
            </span>
            <span data-lang="en">
              If you encounter a problem, get in touch.
            </span>
          </p>

          <p>
            <span data-lang="fi">
              support@liminall.fi
            </span>
            <span data-lang="en">
              support@liminall.fi
            </span>
          </p>

        </div>

      </section>
    </main>
  </div>

  <script>
    const btn = document.getElementById("lang-toggle");

    btn.onclick = () => {
      const current = document.documentElement.getAttribute("data-lang");
      const next = current === "fi" ? "en" : "fi";
      document.documentElement.setAttribute("data-lang", next);
    };
  </script>
</body>
</html>
